<!DOCTYPE HTML>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PWM FastFood</title>
    <link rel="stylesheet" href="/css/style.css">
    <link rel="stylesheet" href="/bootstrap/css/bootstrap.min.css">

</head>
<body hidden="true" data-bs-theme="dark">
    <div id="content">
        <div class="col-12 d-flex flex-column justify-content-center align-items-center text-center">
            <h2>Login to PWM FastFood</h2>
            <input type="text" id="username" class="form-control w-auto rounded-bottom-0" placeholder="Username" required>
            <input type="password" id="password" class="form-control w-auto rounded-top-0" placeholder="Password" required>
            <button type="submit" class="btn btn-primary m-2" onclick="login()">Login</button>
            <h6 class="mt-4">Don't have an account yet?</h6>
            <a href="register.html" class="btn btn-outline-primary">Register</a>
        </div>
    </div>

    <script src="/bootstrap/js/bootstrap.bundle.min.js"></script>
    <script src="/js/layout.js"></script>
    <script src="/js/errorManager.js"></script>
    <script src="/js/login.js"></script>
</body>
</html>
