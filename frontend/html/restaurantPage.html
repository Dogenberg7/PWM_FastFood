<!DOCTYPE HTML>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PWM FastFood</title>
    <link rel="stylesheet" href="/css/style.css">
    <link rel="stylesheet" href="/bootstrap/css/bootstrap.min.css">

</head>
<body data-bs-theme="dark">
<div id="content">
    <div>
        <h1 id="restaurant-name" class="my-0"></h1>
        <div class="row">
            <div class="col-6">
                <h4 id="address-title" class="my-0">Address</h4>
                <div id="restaurant-address" class="my-0"></div>
            </div>
            <div class="col-6">
                <h4 id="phone-title" class="my-0">Phone number</h4>
                <div id="restaurant-phone" class="my-0"></div>
            </div>
        </div>
        <h3 id="menu-title" class="mt-3">Menu</h3>
        <div id="menu" class="row row-cols-1 row-cols-sm-2 row-cols-md-2 row-cols-lg-3 row-cols-xl-3 row-cols-xxl-4">

        </div>
    </div>
</div>

<div id="dishModal" class="modal fade" tabindex="-1">
    <div class="modal-dialog modal-dialog-scrollable">
        <div class="modal-content">
            <div class="modal-header">
                <h1 class="modal-title fs-5" id="dishModalTitle">Dish name</h1>
                <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
            </div>
            <div id="dishModalBody" class="modal-body">
                <img id="dishModalImg" src="" class="img-fluid">
                <h3 class="mb-0">Category</h3>
                <div class="mb-2" id="dishModalCategory"></div>
                <h3 class="mb-0">Price</h3>
                <div class="mb-2" id="dishPrice"></div>
                <h3>Ingredients</h3>
                <ul id="dishModalIngredients">

                </ul>
            </div>
            <div class="modal-footer">
                <div class="input-group">
                    <div class="input-group-text">Amount</div>
                    <input id="dishAmount" class="form-control" type="number" required min="1" step="1" value="1" placeholder="Amount">
                    <button type="button" class="btn btn-primary" onclick="dishToCart()">Add to cart</button>
                </div>
            </div>
        </div>
    </div>
</div>

<script src="/bootstrap/js/bootstrap.bundle.min.js"></script>
<script src="/js/layout.js"></script>
<script src="/js/errorManager.js"></script>
<script src="/js/restaurantPage.js"></script>
</body>
</html>
